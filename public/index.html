<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calendar App</title>
</head>
<body>
    <section class="block">
        <button class="ltem left">&lt;</button>
        <div class="content">
            <section class="Calendar">
                <div class="header">
                    <h2>October</h2>
                    <h1>2023</h1>
                </div>
                <div class="weekdays">
                    <div>пн</div>
                    <div>вт</div>
                    <div>ср</div>
                    <div>чт</div>
                    <div>пт</div>
                    <div>сб</div>
                    <div>вс</div>
                </div>
                <div class="days"></div>
            </section>
        </div>
        <button class="ltem right">&gt;</button>
    </section>
    <section class="console">
                <div class="one" id="one">1</div>
                <div class="two" id="two">2</div>
                <div class="three" id="three">3</div>
    </section>
    

    <!-- Подключаем СКОМПИЛИРОВАННЫЙ JS файл -->
    <script src="../dist/renderer/Calendar.js"></script>
</body>
</html>
